

<!DOCTYPE html>
<html lang="ja">
<head>

<title>会社について | ねこねこ旅客鉄道株式会社</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Yu Gothic","Hiragino Sans",sans-serif;
    background:#eef7ff;
    color:#333;
}

/* ===== 上部バー ===== */

.topbar{
    position:sticky;
    top:0;
    z-index:2000;

    height:70px;

    background:#1f8fff;

    display:flex;
    align-items:center;

    padding:0 15px;

    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.menu-btn{
    background:none;
    border:none;

    color:white;

    font-size:30px;

    cursor:pointer;
}

.logo-link{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.logo-link img{
    height:45px;
}

/* ===== サイドメニュー ===== */

#sideMenu{
    position:fixed;

    top:0;
    left:-260px;

    width:250px;
    height:100%;

    background:white;

    padding-top:80px;

    transition:0.3s;

    box-shadow:3px 0 15px rgba(0,0,0,.15);

    z-index:3000;
}

#sideMenu h3{
    text-align:center;
    margin-bottom:20px;
    color:#1f8fff;
}

#sideMenu a{
    display:block;
    padding:15px 25px;
    text-decoration:none;
    color:#333;
}

#sideMenu a:hover{
    background:#eef7ff;
}

/* ===== コンテンツ ===== */

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.page-title{
    text-align:center;
    color:#1f8fff;
    margin-bottom:30px;
}

.card{
    background:white;
    border-radius:25px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card h2{
    color:#1f8fff;
    margin-bottom:15px;
}

.card ul{
    padding-left:25px;
}

.card li{
    margin:8px 0;
}

/* ===== フッター ===== */

footer{
    margin-top:40px;
    background:#1f8fff;
    color:white;
    text-align:center;
    padding:20px;
}

.version{
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
}

</style>
</head>
<body>
<header class="topbar">
<button class="menu-btn" id="menuBtn">☰</button>

<a href="index.html" class="logo-link">
    <img src="logo.png" alt="NRロゴ">
</a>
</header>
<div id="sideMenu">
<h3>MENU</h3>

<a href="index.html">🏠 ホーム</a>

<a href="staff.html">📋 活動報告</a>
<a href="links.html">🔗 各リンク</a>
</div>
<div class="container">
<h1 class="page-title">🏢 会社について</h1>

<div class="card">

    <h2>会社概要</h2>

    <p>
        ねこねこ旅客鉄道株式会社は、
        Minecraft内での鉄道開発/延伸、
        Discordサーバーの運営を中心に活動している団体です。
    </p>

</div>

<div class="card">

    <h2>主な事業</h2>

    <ul>
        <li>鉄道開発</li>
        <li>鉄道延伸</li>
        <li>Minecraftサーバー開発</li>
        <li>コミュニティ運営</li>
    </ul>

</div>

<div class="card">

    <h2>運営方針</h2>

    <p>
        誰でも気軽に参加できる環境づくりを目指し、
        楽しく活動できるコミュニティの運営を行っています。
    </p>

</div>
</div>
<footer>
<div>© 2025 ねこねこ旅客鉄道株式会社</div>

<div class="version">Version v1.0.0</div>
</footer>
<script>

const menuBtn =
document.getElementById("menuBtn");

const sideMenu =
document.getElementById("sideMenu");

let open = false;

menuBtn.onclick = () => {

    if(open){
        sideMenu.style.left = "-260px";
    }else{
        sideMenu.style.left = "0";
    }

    open = !open;

};

</script>
</body>
</html>
