<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お知らせ | ねこねこ旅客鉄道株式会社</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Yu Gothic","Hiragino Sans",sans-serif;background:#eef7ff;color:#333;}

.header{
background:#4ab7ff;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:sticky;
top:0;
z-index:100;
}

.menu-btn{
color:white;
font-size:32px;
text-decoration:none;
background:none;
border:none;
cursor:pointer;
}

.logo{height:50px;}
.logo-link{margin:auto;}

.sidebar{
position:fixed;
top:0;
left:-280px;
width:280px;
height:100%;
background:white;
box-shadow:3px 0 15px rgba(0,0,0,.15);
transition:.3s;
z-index:1000;
padding:25px;
}

.sidebar.active{left:0;}

.sidebar h3{
color:#1f8fff;
margin-bottom:20px;
font-size:40px;
text-align:center;
}

.sidebar a{
display:block;
text-decoration:none;
color:#333;
padding:10px 0;
margin:28px 0;
border:none;
font-size:18px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:999;
}

.overlay.active{display:block;}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
}

.page-title{
text-align:center;
color:#1f8fff;
margin-bottom:30px;
}

.category{
background:white;
border-radius:25px;
padding:25px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.category h2{
margin-bottom:20px;
}

.news-item{
background:white;
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.news-date{
font-size:14px;
color:#666;
font-weight:bold;
margin-bottom:10px;
}

.notice{border-left:6px solid #1f8fff;}
.update{border-left:6px solid #4ab7ff;}

.no-news-minecraft{
color:#666;
padding-left:10px;
border-left:6px solid #8c9eff;
}

.no-news-other{
color:#666;
padding-left:10px;
border-left:6px solid #b39ddb;
}

footer{
background:#4ab7ff;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

.version{
font-size:12px;
opacity:.8;
margin-top:5px;
}
</style>
</head>
<body>

<div id="sidebar" class="sidebar">
<h3>MENU</h3>

<a href="index.html">🏠 ホーム</a>
<a href="news.html">📢 お知らせ</a>
<a href="company.html">🏢 会社について</a>
<a href="staff.html">👥 運営部紹介</a>
<a href="report.html">📋 活動報告</a>
<a href="links.html">🔗 各リンク</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<div class="header">
<button class="menu-btn" onclick="openMenu()">☰</button>
<a href="index.html" class="logo-link">
<img src="logo.png" class="logo" alt="ロゴ">
</a>
<div style="width:32px;"></div>
</div>

<div class="container">

<h1 class="page-title">📢 お知らせ</h1>

<div class="category">
<h2 style="color:#1f8fff;">📣 お知らせ</h2>

<div class="news-item notice">
<div class="news-date">2026/6/5</div>
<p>公式サイトを公開しました！</p>
</div>
</div>

<div class="category">
<h2 style="color:#4ab7ff;">🌐 公式サイト更新状況</h2>

<div class="news-item update">
<div class="news-date">2026/6/7</div>
<p>ページを追加しました！</p>
</div>

<div class="news-item update">
<div class="news-date">2026/6/6</div>
<p>サイドバーを追加しました！</p>
</div>
</div>

</p>
</div>

</p>
</div>

</div>

<footer>
© 2026 ねこねこ旅客鉄道株式会社
<div class="version">Version v1.0.0</div>
</footer>

<script>
function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
